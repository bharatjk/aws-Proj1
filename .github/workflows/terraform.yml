# ═══════════════════════════════════════════════════════════════
# TERRAFORM CI/CD WORKFLOW - AUTO-DETECT + MANUAL APPROVAL
# ═══════════════════════════════════════════════════════════════
# Workflow:
# 1. Detect which phase folders changed
# 2. Run terraform plan on changed phases
# 3. WAIT for manual approval
# 4. Run terraform apply only after approval
# ═══════════════════════════════════════════════════════════════

name: Terraform

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-2

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Detect which phase folders changed
  # ─────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Phases
    runs-on: ubuntu-latest
    outputs:
      phases: ${{ steps.set-phases.outputs.phases }}
      phases-exist: ${{ steps.set-phases.outputs.phases-exist }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            P0:
              - 'P0/**'
            VPC-Compute:
              - 'VPC-Compute/**'
            Compute-AutoScale:
              - 'Compute-AutoScale/**'
            Storage:
              - 'Storage/**'

      - name: Set phases matrix
        id: set-phases
        run: |
          phases="[]"
          
          if [[ "${{ steps.filter.outputs.P0 }}" == "true" ]]; then
            phases=$(echo "$phases" | jq -c '. + ["P0"]')
          fi
          
          if [[ "${{ steps.filter.outputs.VPC-Compute }}" == "true" ]]; then
            phases=$(echo "$phases" | jq -c '. + ["VPC-Compute"]')
          fi
          
          if [[ "${{ steps.filter.outputs.Compute-AutoScale }}" == "true" ]]; then
            phases=$(echo "$phases" | jq -c '. + ["Compute-AutoScale"]')
          fi
          
          if [[ "${{ steps.filter.outputs.Storage }}" == "true" ]]; then
            phases=$(echo "$phases" | jq -c '. + ["Storage"]')
          fi
          
          echo "phases=$phases" >> $GITHUB_OUTPUT
          
          if [[ "$phases" == "[]" ]]; then
            echo "phases-exist=false" >> $GITHUB_OUTPUT
            echo "No phase changes detected"
          else
            echo "phases-exist=true" >> $GITHUB_OUTPUT
            echo "Changed phases: $phases"
          fi

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Run Terraform Plan on changed phases
  # ─────────────────────────────────────────────────────────────
  terraform-plan:
    name: Plan - ${{ matrix.phase }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.phases-exist == 'true'
    
    strategy:
      matrix:
        phase: ${{ fromJSON(needs.detect-changes.outputs.phases) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ${{ matrix.phase }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ matrix.phase }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        working-directory: ${{ matrix.phase }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ matrix.phase }}
        run: terraform plan -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Show Full Plan Output
        if: always()
        working-directory: ${{ matrix.phase }}
        run: cat plan_output.txt

      - name: Fail if Plan Failed
        working-directory: ${{ matrix.phase }}
        run: grep -q "Error:" plan_output.txt && exit 1 || exit 0

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Request manual approval before applying
  # ─────────────────────────────────────────────────────────────
  request-approval:
    name: 🔒 Request Approval
    runs-on: ubuntu-latest
    needs: [detect-changes, terraform-plan]
    if: |
      needs.detect-changes.outputs.phases-exist == 'true' &&
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push'
    environment:
      name: production
      
    steps:
      - name: ⏳ Waiting for manual approval
        run: |
          echo "This deployment is waiting for manual approval."
          echo ""
          echo "Go to: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "Then click 'Review deployments' to approve or reject."

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Run Terraform Apply after approval
  # ─────────────────────────────────────────────────────────────
  terraform-apply:
    name: ✅ Apply - ${{ matrix.phase }}
    runs-on: ubuntu-latest
    needs: [detect-changes, terraform-plan, request-approval]
    if: |
      needs.detect-changes.outputs.phases-exist == 'true' &&
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push'
    
    strategy:
      matrix:
        phase: ${{ fromJSON(needs.detect-changes.outputs.phases) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: ${{ matrix.phase }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ matrix.phase }}
        run: terraform apply -auto-approve -no-color

      - name: Release Terraform Lock on failure
        if: failure() || cancelled()
        working-directory: ${{ matrix.phase }}
        run: |
          # 1. Try to get Lock ID using modern terraform metadata first
          LOCK_ID=$(terraform show -json 2>/dev/null | jq -r '.lock.id // empty' || true)
          
          # 2. If metadata failed, fall back to scanning DynamoDB dynamically
          if [ -z "$LOCK_ID" ]; then
            LOCK_ID=$(aws dynamodb scan \
              --table-name tf-state-lock \
              --region us-east-2 \
              --query "Items[?contains(LockID.S, '${{ github.workflow }}')].LockID.S" \
              --output text 2>/dev/null || true)
          fi

          # 3. Only run unlock if a non-empty Lock ID was successfully found
          if [ -n "$LOCK_ID" ] && [ "$LOCK_ID" != "None" ]; then
            echo "Found active Lock ID: $LOCK_ID. Proceeding to force unlock."
            terraform force-unlock -force "$LOCK_ID"
          else
            echo "No active lock ID found in state or DynamoDB table. Skipping unlock."
          fi
